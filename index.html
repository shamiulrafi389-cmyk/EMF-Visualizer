<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced EMF & Signal Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>EMF & Network Signal Visualizer</h1>
            <p>Seventh Semester Electrical Engineering Project | GitHub Hostable</p>
        </header>

        <div class="monitor-grid">
            <div class="card">
                <h3>Generator Simulation</h3>
                <canvas id="genCanvas"></canvas>
            </div>
            <div class="card">
                <h3>EMF Waveform (with Interference)</h3>
                <canvas id="waveCanvas"></canvas>
            </div>
        </div>

        <div class="status-bar">
            <p>Network Type: <span id="netType">Loading...</span></p>
            <p>Interference Level: <span id="noiseLevel">Low</span></p>
        </div>

        <div class="controls">
            <div class="slider-box">
                <label>RPM (Generator Speed)</label>
                <input type="range" id="speed" min="1" max="100" value="20">
            </div>
            <div class="slider-box">
                <label>Flux Density (B)</label>
                <input type="range" id="flux" min="10" max="80" value="40">
            </div>
            <div class="slider-box">
                <label>Manual Noise (Tower Interference)</label>
                <input type="range" id="manualNoise" min="0" max="50" value="5">
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
